name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Resolve Cloudflare account ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ACCOUNTS=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/accounts)
          ID=$(echo "$ACCOUNTS" | jq -r '.result[0].id // empty')
          if [ -z "$ID" ]; then
            echo "accounts API returned no account; errors:" >&2
            echo "$ACCOUNTS" | jq '.errors' >&2 || true
            MEMBERSHIPS=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              https://api.cloudflare.com/client/v4/memberships)
            ID=$(echo "$MEMBERSHIPS" | jq -r '.result[0].account.id // empty')
          fi
          if [ -n "$ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID=$ID" >> "$GITHUB_ENV"
            echo "Resolved account ID."
          else
            echo "Could not resolve account ID; wrangler will attempt discovery."
          fi

      # Pages secrets live on the Pages project, not in this repo. Re-putting
      # them on each deploy is idempotent; empty GH secrets are skipped.
      - name: Sync Pages secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          for s in JWT_SECRET DEEPSEEK_API_KEY RESEND_API_KEY EMAIL_FROM; do
            v="${!s}"
            if [ -n "$v" ]; then
              printf '%s' "$v" | npx wrangler pages secret put "$s" --project-name photo
            else
              echo "Skipping $s (no GitHub secret set)"
            fi
          done

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy ./dist --project-name photo --branch main
