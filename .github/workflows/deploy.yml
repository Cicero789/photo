name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Pick whichever token can see the account, and resolve the account ID.
      # CLOUDFLARE_ACCOUNT_ID can also be set directly as a repo secret to
      # skip discovery (find it in the dash.cloudflare.com URL or sidebar).
      - name: Resolve Cloudflare credentials
        env:
          TOKEN_MAIN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TOKEN_ALT: ${{ secrets.CLOUDFLARE_API_TOKEN_ALT }}
          ACCOUNT_ID_OVERRIDE: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          resolve() {
            local tok="$1" id
            id=$(curl -s -H "Authorization: Bearer $tok" \
              https://api.cloudflare.com/client/v4/accounts | jq -r '.result[0].id // empty')
            if [ -z "$id" ]; then
              id=$(curl -s -H "Authorization: Bearer $tok" \
                https://api.cloudflare.com/client/v4/memberships | jq -r '.result[0].account.id // empty')
            fi
            echo "$id"
          }
          CHOSEN_TOKEN="" ; CHOSEN_ID="$ACCOUNT_ID_OVERRIDE"
          for name in TOKEN_MAIN TOKEN_ALT; do
            tok="${!name}"
            [ -z "$tok" ] && continue
            if [ -n "$CHOSEN_ID" ]; then CHOSEN_TOKEN="$tok"; echo "Using $name with provided account ID"; break; fi
            id=$(resolve "$tok")
            if [ -n "$id" ]; then CHOSEN_TOKEN="$tok"; CHOSEN_ID="$id"; echo "Resolved account via $name"; break; fi
            echo "$name cannot list accounts/memberships"
          done
          if [ -z "$CHOSEN_TOKEN" ] || [ -z "$CHOSEN_ID" ]; then
            echo "::error::Could not resolve a Cloudflare account ID with the available tokens."
            echo "::error::Fix: add a repo secret CLOUDFLARE_ACCOUNT_ID (dash.cloudflare.com → right sidebar / URL),"
            echo "::error::or use an API token with 'Account Settings: Read' + 'Cloudflare Pages: Edit' permissions."
            exit 1
          fi
          echo "::add-mask::$CHOSEN_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CHOSEN_TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CHOSEN_ID" >> "$GITHUB_ENV"

      # Pages secrets live on the Pages project, not in this repo. Re-putting
      # them on each deploy is idempotent; empty GH secrets are skipped.
      - name: Sync Pages secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          for s in JWT_SECRET DEEPSEEK_API_KEY RESEND_API_KEY EMAIL_FROM; do
            v="${!s}"
            if [ -n "$v" ]; then
              printf '%s' "$v" | npx wrangler pages secret put "$s" --project-name photo
            else
              echo "Skipping $s (no GitHub secret set)"
            fi
          done

      - name: Deploy
        run: npx wrangler pages deploy ./dist --project-name photo --branch main
